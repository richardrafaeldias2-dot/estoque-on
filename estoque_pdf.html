<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Estoque - Real-Time</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial; margin: 0; padding: 0; background-size: cover; background-position: center; background-repeat: no-repeat; transition: background-image 0.5s ease; background-attachment: fixed; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; background: rgba(255,255,255,0.9); }
th, td { border: 1px solid black; padding: 8px; text-align: center; }
button { cursor: pointer; padding: 5px 10px; margin:2px; border-radius: 4px; border: 1px solid #ccc; }
.login { max-width: 300px; margin: 100px auto; border:1px solid #ccc; padding: 20px; background: white; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); }
.detalhes td { text-align: left; background: #f0f0f0; }
.btn-save { background: #28a745; color: white; padding: 10px 20px; font-weight: bold; margin-top: 20px; width: 100%; border: none; }
.btn-fundo { background: #6c757d; color: white; }
</style>
</head>
<body>

<div id="loginArea" class="login">
<h3>Estoque Cloud - Login</h3>
<input id="user" placeholder="Usuário" style="width:90%"><br><br>
<input id="senha" type="password" placeholder="Senha" style="width:90%"><br><br>
<button onclick="login()" style="width:100%; background:#007bff; color:white;">Entrar</button>
</div>

<div id="sistema" style="display:none; padding: 20px;">
    <div style="background: rgba(255,255,255,0.8); padding: 15px; border-radius: 8px;">
        <h2>Controle de Estoque Real-Time</h2>
        <p>Usuário: <b id="usuarioLogado"></b></p>
        <button class="btn-fundo" onclick="alterarFundo()">Mudar Fundo</button>
        <button class="btn-fundo" onclick="removerFundo()">Remover Fundo</button>
    </div>

    <br>
    <div style="background: white; padding: 15px; border-radius: 8px;">
        <input type="file" id="pdfInput"> Importar PDF<br><br>
        Código: <input id="codigoScan">
        Qtd: <input id="quantidade" value="1" type="number" style="width:50px">
        <button onclick="retirar()" style="background:#ffcccc">Retirar</button>
        <button onclick="adicionar()" style="background:#ccffcc">Adicionar</button>
        <button id="filtrarCentroBtn" style="display:none;" onclick="gerarPDFCentro()">PDF por Centro</button>
    </div>

    <table id="tabela">
        <thead>
            <tr style="background:#eee">
                <th>Código</th>
                <th>Descrição</th>
                <th>Estoque</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn-save" onclick="salvar()">☁️ SALVAR E SINCRONIZAR COM A EQUIPE</button>
</div>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyCpjtnohNiLmcBAb-zkblJN3Ct4dMgRt0U",
    authDomain: "estoque-ab833.firebaseapp.com",
    projectId: "estoque-ab833",
    storageBucket: "estoque-ab833.firebasestorage.app",
    messagingSenderId: "106574308873",
    appId: "1:106574308873:web:3596d682627b03fbad7ad8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let produtos = {};
let usuarios = {
    "richard": { senha:"123", nivel:"master", bg: "url('https://i.imgur.com/8Km9tLL.jpg')" },
    "adm": { senha:"123", nivel:"adm", bg: "url('https://i.imgur.com/3xjRkG7.jpg')" },
    "aprendiz": { senha:"123", nivel:"aprendiz", bg: "url('https://i.imgur.com/6Z8Q9sA.jpg')" }
};
let usuarioAtual = null;
const fundoPadrao = "url('https://i.imgur.com/5fOqX1Z.jpg')";
document.body.style.backgroundImage = fundoPadrao;

// SINCRONIZAÇÃO EM TEMPO REAL (O SEGREDO)
function ativarSincronizacao() {
    db.collection("estoque").doc("principal").onSnapshot((doc) => {
        if (doc.exists) {
            produtos = doc.data().produtos || {};
            atualizarTabela();
            console.log("Sincronizado com a nuvem!");
        }
    });
}

function login() {
    let u = document.getElementById("user").value.toLowerCase();
    let s = document.getElementById("senha").value;
    if (!usuarios[u] || usuarios[u].senha !== s) { alert("Dados incorretos"); return; }
    
    usuarioAtual = usuarios[u];
    document.getElementById("loginArea").style.display = "none";
    document.getElementById("sistema").style.display = "block";
    document.getElementById("usuarioLogado").innerText = u;
    document.body.style.backgroundImage = usuarioAtual.bg || fundoPadrao;

    if(u === "richard" || u === "adm") document.getElementById("filtrarCentroBtn").style.display = "inline";
    
    ativarSincronizacao(); // Começa a ouvir o outro PC
}

function alterarFundo() {
    let url = prompt("Cole o link da imagem (URL) ou deixe em branco para carregar arquivo:");
    if(url) {
        usuarioAtual.bg = `url('${url}')`;
        document.body.style.backgroundImage = usuarioAtual.bg;
    } else {
        let input = document.createElement("input");
        input.type = "file";
        input.onchange = e => {
            let reader = new FileReader();
            reader.onload = () => {
                usuarioAtual.bg = `url('${reader.result}')`;
                document.body.style.backgroundImage = usuarioAtual.bg;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }
}

function removerFundo() {
    usuarioAtual.bg = fundoPadrao;
    document.body.style.backgroundImage = fundoPadrao;
    alert("Fundo removido!");
}

function atualizarTabela() {
    let tbody = document.querySelector("#tabela tbody");
    tbody.innerHTML = "";
    for (let c in produtos) {
        let p = produtos[c];
        let tr = document.createElement("tr");
        tr.innerHTML = `<td>${c}</td><td>${p.descricao}</td><td><b>${p.estoque}</b></td>
        <td><button onclick="toggleDetalhes('${c}')">Ver Histórico</button></td>`;
        tbody.appendChild(tr);

        let trD = document.createElement("tr");
        trD.id = `detalhes-${c}`;
        trD.style.display = "none";
        trD.className = "detalhes";
        
        let hist = (p.historico || []).map(h => `<li>${h.data} - ${h.tipo}: ${h.quantidade} (${h.usuario})</li>`).join("");
        trD.innerHTML = `<td colspan="4"><ul>${hist || "Sem histórico"}</ul></td>`;
        tbody.appendChild(trD);
    }
}

function toggleDetalhes(c) {
    let d = document.getElementById(`detalhes-${c}`);
    d.style.display = d.style.display === "none" ? "table-row" : "none";
}

async function salvar() {
    try {
        await db.collection("estoque").doc("principal").set({ produtos });
        alert("✅ Sincronizado! Todos os PCs agora têm essa versão.");
    } catch (e) { alert("Erro: " + e.message); }
}

function adicionar() {
    let c = document.getElementById("codigoScan").value;
    let q = parseFloat(document.getElementById("quantidade").value);
    if(!produtos[c]) produtos[c] = { descricao: "Novo Produto", estoque: 0, historico: [] };
    produtos[c].estoque += q;
    produtos[c].historico.push({ tipo: "Entrada", quantidade: q, data: new Date().toLocaleString(), usuario: document.getElementById("usuarioLogado").innerText });
    atualizarTabela();
}

function retirar() {
    let c = document.getElementById("codigoScan").value;
    let q = parseFloat(document.getElementById("quantidade").value);
    if(!produtos[c] || produtos[c].estoque < q) { alert("Estoque insuficiente"); return; }
    produtos[c].estoque -= q;
    produtos[c].historico.push({ tipo: "Saída", quantidade: q, data: new Date().toLocaleString(), usuario: document.getElementById("usuarioLogado").innerText });
    atualizarTabela();
}
</script>
</body>
</html>
